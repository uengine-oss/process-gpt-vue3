apiVersion: v1
kind: Service
metadata:
  name: completion-service
  labels:
    {{- include "process-gpt.labels" . | nindent 4 }}
    app.kubernetes.io/component: completion
spec:
  type: {{ .Values.completion.service.type }}
  ports:
    - port: {{ .Values.completion.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "process-gpt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: completion
