apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "process-gpt.fullname" . }}-frontend
  labels:
    {{- include "process-gpt.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "process-gpt.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "process-gpt.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: VITE_SUPABASE_URL
              value: {{ .Values.frontend.env.supabaseUrl | default (include "process-gpt.supabaseInternalUrl" .) | quote }}
            - name: VITE_SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "process-gpt.fullname" . }}-secrets
                  key: ANON_KEY
            {{- if .Values.frontend.env.openaiApiKey }}
            - name: VITE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "process-gpt.fullname" . }}-secrets
                  key: OPENAI_API_KEY
            {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          {{- if .Values.frontend.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.frontend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.frontend.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: {{ .Values.frontend.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.readinessProbe.periodSeconds }}
          {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
