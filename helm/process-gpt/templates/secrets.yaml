apiVersion: v1
kind: Secret
metadata:
  name: {{ include "process-gpt.fullname" . }}-secrets
  labels:
    {{- include "process-gpt.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.global.database.password | quote }}
  JWT_SECRET: {{ .Values.global.jwt.secret | quote }}
  ANON_KEY: {{ .Values.global.jwt.anonKey | quote }}
  SERVICE_ROLE_KEY: {{ .Values.global.jwt.serviceRoleKey | quote }}
  OPENAI_API_KEY: {{ .Values.global.openaiApiKey | quote }}
  {{- if .Values.global.smtp.password }}
  SMTP_PASSWORD: {{ .Values.global.smtp.password | quote }}
  {{- end }}
