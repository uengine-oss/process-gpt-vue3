apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  labels:
    {{- include "process-gpt.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "process-gpt.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
