name: process-gpt-build-and-deploy

on:
  push:
    branches:
      - skt

jobs:
  SBOM-upload:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: write
      
    steps:
    - uses: actions/checkout@v4
    - name: Generate SBOM
      run: | 
        curl -Lo $RUNNER_TEMP/sbom-tool https://github.com/microsoft/sbom-tool/releases/latest/download/sbom-tool-linux-x64
        chmod +x $RUNNER_TEMP/sbom-tool
        $RUNNER_TEMP/sbom-tool generate -b . -bc . -pn ${{ github.repository }} -pv 1.0.0 -ps OwnerName -nsb https://sbom.mycompany.com -V Verbose
    - uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: _manifest/spdx_2.2
    - name: SBOM upload 
      uses: advanced-security/spdx-dependency-submission-action@v0.2.0
      with:
        filePath: "_manifest/spdx_2.2/"
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # SAST tooling prerequisite: Semgrep CLI runs on Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # SAST scanner installation (Semgrep OSS).
      - name: Install Semgrep
        run: pip install semgrep
      
      - name: Remove node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # OSS license compliance check for production dependencies.
      - name: License check
        run: npm run license:check

      # Vue-focused SAST pipeline:
      # - Semgrep scan on extracted <script> blocks from .vue files
      # - ESLint report for src/**/*.(vue|js|ts)
      # - vue-tsc typecheck report
      - name: Run Vue SAST report
        run: npm run sast:vue:report

      # Keep SAST evidence even when later steps fail.
      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports-${{ github.sha }}
          path: reports/
          if-no-files-found: warn

      - name: Type check and build
        run: NODE_OPTIONS="--max-old-space-size=4096" yarn build

      - name: Package build artifact
        run: |
          tar -czf process-gpt-dist-${{ github.sha }}.tar.gz dist

      # Provide SHA256 hash for release artifact integrity verification.
      - name: Generate SHA256SUMS
        run: |
          sha256sum process-gpt-dist-${{ github.sha }}.tar.gz > SHA256SUMS
          cat SHA256SUMS

      # Optional cryptographic signature for hash manifest.
      # Requires: GPG_PRIVATE_KEY, GPG_PASSPHRASE secrets.
      - name: Optional GPG sign SHA256SUMS
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "GPG_PRIVATE_KEY is not set. Skip signing."
            exit 0
          fi
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      - name: Upload build artifact (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: process-gpt-dist-${{ github.sha }}
          path: |
            process-gpt-dist-${{ github.sha }}.tar.gz
            SHA256SUMS
            SHA256SUMS.asc
          if-no-files-found: error

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image to GHCR
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          
          if [ "${{ github.ref_name }}" == "skt" ]; then
            IMAGE_NAME=ghcr.io/uengine-oss/process-gpt-skt:$IMAGE_TAG
          else
            IMAGE_NAME=ghcr.io/uengine-oss/process-gpt:$IMAGE_TAG
          fi

          docker build -t $IMAGE_NAME -t $IMAGE_NAME_LATEST .
          docker push $IMAGE_NAME
          docker push $IMAGE_NAME_LATEST

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "IMAGE_NAME_LATEST=$IMAGE_NAME_LATEST" >> $GITHUB_ENV

      - name: Checkout GitOps repository
        if: github.ref_name == 'main'
        uses: actions/checkout@v3
        with:
          repository: uengine-oss/process-gpt-k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Install yq
        if: github.ref_name == 'main'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in GitOps repository
        if: github.ref_name == 'main'
        run: |
          cd gitops-repo
          
          # Update frontend deployment image
          yq eval '.spec.template.spec.containers[0].image = "'$IMAGE_NAME'"' -i deployments/frontend-deployment.yaml

          echo "Updated frontend image to: $IMAGE_NAME"

      - name: Commit and push changes
        if: github.ref_name == 'main'
        run: |
          cd gitops-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add .
          git commit -m "Update frontend image to $IMAGE_TAG" || exit 0
          git push

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary (Frontend)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image (commit)** | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image (latest)** | \`${{ env.IMAGE_NAME_LATEST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ env.IMAGE_TAG }}\` / \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "| **GitOps Repo** | [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ ArgoCD will automatically sync the changes from the GitOps repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Docker image built and pushed successfully. (GitOps update skipped for ${{ github.ref_name }} branch)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create deployment comment (with retry)
        if: github.ref_name == 'main'
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const maxRetries = 3;
            let attempt = 0;
            
            while (attempt < maxRetries) {
              try {
                const commentBody = [
                  '🚀 **Frontend Deployment Started**',
                  '',
                  '**Image (commit):** `${{ env.IMAGE_NAME }}`',
                  '**Image (latest):** `${{ env.IMAGE_NAME_LATEST }}`',
                  '**Tags:** `${{ env.IMAGE_TAG }}` / `latest`',
                  '',
                  'ArgoCD will automatically sync the changes from [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s)',
                  '',
                  '---',
                  '*Deployed via GitHub Actions*'
                ].join('\n');
                
                await github.rest.repos.createCommitComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: context.sha,
                  body: commentBody
                });
                console.log('Successfully created commit comment');
                break;
              } catch (error) {
                attempt++;
                console.log(`Attempt ${attempt} failed:`, error.message);
                
                if (attempt >= maxRetries) {
                  console.log('All attempts failed, but deployment was successful');
                  core.warning('Failed to create commit comment, but deployment completed successfully');
                } else {
                  console.log(`Retrying in ${attempt * 2} seconds...`);
                  await new Promise(resolve => setTimeout(resolve, attempt * 2000));
                }
              }
            }

  build-and-deploy-gateway:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Java for Gateway build
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build Gateway JAR
        run: mvn -f gateway/pom.xml -DskipTests package

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Gateway Docker image to GHCR
        run: |
          GATEWAY_IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          GATEWAY_IMAGE_NAME=ghcr.io/uengine-oss/process-gpt-gateway:$GATEWAY_IMAGE_TAG
          GATEWAY_IMAGE_NAME_LATEST=ghcr.io/uengine-oss/process-gpt-gateway:latest

          docker build -t $GATEWAY_IMAGE_NAME -t $GATEWAY_IMAGE_NAME_LATEST ./gateway
          docker push $GATEWAY_IMAGE_NAME
          docker push $GATEWAY_IMAGE_NAME_LATEST

          echo "GATEWAY_IMAGE_TAG=$GATEWAY_IMAGE_TAG" >> $GITHUB_ENV
          echo "GATEWAY_IMAGE_NAME=$GATEWAY_IMAGE_NAME" >> $GITHUB_ENV
          echo "GATEWAY_IMAGE_NAME_LATEST=$GATEWAY_IMAGE_NAME_LATEST" >> $GITHUB_ENV

      - name: Checkout GitOps repository
        uses: actions/checkout@v3
        with:
          repository: uengine-oss/process-gpt-k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update gateway image tag in GitOps repository
        run: |
          cd gitops-repo

          if [ -f deployments/gateway.yaml ]; then
            yq eval '.spec.template.spec.containers[0].image = "'$GATEWAY_IMAGE_NAME'"' -i deployments/gateway.yaml
            echo "Updated gateway image to: $GATEWAY_IMAGE_NAME"
          else
            # Fallback: try to find any manifest referencing process-gpt-gateway
            GATEWAY_FILES=$(grep -rl "process-gpt-gateway" . || true)
            if [ -n "$GATEWAY_FILES" ]; then
              echo "$GATEWAY_FILES" | while read -r f; do
                if [ -n "$f" ] && [ -f "$f" ]; then
                  yq eval '.spec.template.spec.containers[0].image = "'$GATEWAY_IMAGE_NAME'"' -i "$f" || true
                  echo "Updated gateway image in: $f"
                fi
              done
            else
              echo "No gateway manifest found in GitOps repo. Skipping gateway image update."
            fi
          fi

      - name: Commit and push changes
        run: |
          cd gitops-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add .
          git commit -m "Update gateway image to $GATEWAY_IMAGE_TAG" || exit 0
          git push

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary (Gateway)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Gateway Image (commit)** | \`${{ env.GATEWAY_IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Gateway Image (latest)** | \`${{ env.GATEWAY_IMAGE_NAME_LATEST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Gateway Tag** | \`${{ env.GATEWAY_IMAGE_TAG }}\` / \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **GitOps Repo** | [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ ArgoCD will automatically sync the changes from the GitOps repository." >> $GITHUB_STEP_SUMMARY

      - name: Create deployment comment (with retry)
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const maxRetries = 3;
            let attempt = 0;
            
            while (attempt < maxRetries) {
              try {
                const commentBody = [
                  '🚀 **Gateway Deployment Started**',
                  '',
                  '**Gateway Image (commit):** `${{ env.GATEWAY_IMAGE_NAME }}`',
                  '**Gateway Image (latest):** `${{ env.GATEWAY_IMAGE_NAME_LATEST }}`',
                  '**Gateway Tags:** `${{ env.GATEWAY_IMAGE_TAG }}` / `latest`',
                  '',
                  'ArgoCD will automatically sync the changes from [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s)',
                  '',
                  '---',
                  '*Deployed via GitHub Actions*'
                ].join('\n');
                
                await github.rest.repos.createCommitComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: context.sha,
                  body: commentBody
                });
                console.log('Successfully created commit comment');
                break;
              } catch (error) {
                attempt++;
                console.log(`Attempt ${attempt} failed:`, error.message);
                
                if (attempt >= maxRetries) {
                  console.log('All attempts failed, but deployment was successful');
                  core.warning('Failed to create commit comment, but deployment completed successfully');
                } else {
                  console.log(`Retrying in ${attempt * 2} seconds...`);
                  await new Promise(resolve => setTimeout(resolve, attempt * 2000));
                }
              }
            }
