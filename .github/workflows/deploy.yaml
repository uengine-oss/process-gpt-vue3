name: process-gpt-build-and-deploy

on:
  push:
    branches:
      - main

jobs:
  SBOM-upload:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: write
      
    steps:
    - uses: actions/checkout@v4
    - name: Generate SBOM
      run: | 
        curl -Lo $RUNNER_TEMP/sbom-tool https://github.com/microsoft/sbom-tool/releases/latest/download/sbom-tool-linux-x64
        chmod +x $RUNNER_TEMP/sbom-tool
        $RUNNER_TEMP/sbom-tool generate -b . -bc . -pn ${{ github.repository }} -pv 1.0.0 -ps OwnerName -nsb https://sbom.mycompany.com -V Verbose
    - uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: _manifest/spdx_2.2
    - name: SBOM upload 
      uses: advanced-security/spdx-dependency-submission-action@v0.2.0
      with:
        filePath: "_manifest/spdx_2.2/"
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      # SAST tooling prerequisite: Semgrep CLI runs on Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # SAST scanner installation (Semgrep OSS).
      - name: Install Semgrep
        run: pip install semgrep
      
      - name: Remove node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # OSS license compliance check for production dependencies.
      - name: License check
        run: npm run license:check

      # Vue-focused SAST pipeline:
      # - Semgrep scan on extracted <script> blocks from .vue files
      # - ESLint report for src/**/*.(vue|js|ts)
      # - vue-tsc typecheck report
      - name: Run Vue SAST report
        run: npm run sast:vue:report

      # Keep SAST evidence even when later steps fail.
      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports-${{ github.sha }}
          path: reports/
          if-no-files-found: warn

      - name: Type check and build
        run: |
          if [ -f yarn.lock ]; then
            NODE_OPTIONS="--max-old-space-size=4096" yarn build
          else
            NODE_OPTIONS="--max-old-space-size=4096" npm run build
          fi

      - name: Package build artifact
        run: |
          tar -czf process-gpt-dist-${{ github.sha }}.tar.gz dist

      # Provide SHA256 hash for release artifact integrity verification.
      - name: Generate SHA256SUMS
        run: |
          sha256sum process-gpt-dist-${{ github.sha }}.tar.gz > SHA256SUMS
          cat SHA256SUMS

      # ── 빌드 아티팩트 코드서명 (cosign sign-blob, keyless OIDC) ──
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign build artifact with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign-blob --yes \
            --output-signature process-gpt-dist-${{ github.sha }}.tar.gz.sig \
            --output-certificate process-gpt-dist-${{ github.sha }}.tar.gz.cert \
            process-gpt-dist-${{ github.sha }}.tar.gz

      # ── SLSA Build Provenance 증명 (GitHub Attestation) ──
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: process-gpt-dist-${{ github.sha }}.tar.gz

      # Optional GPG signature (if GPG key configured).
      - name: Optional GPG sign SHA256SUMS
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "GPG_PRIVATE_KEY is not set. Skip GPG signing."
            exit 0
          fi
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      - name: Upload build artifact (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: process-gpt-dist-${{ github.sha }}
          path: |
            process-gpt-dist-${{ github.sha }}.tar.gz
            process-gpt-dist-${{ github.sha }}.tar.gz.sig
            process-gpt-dist-${{ github.sha }}.tar.gz.cert
            SHA256SUMS
            SHA256SUMS.asc
          if-no-files-found: error

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image to GHCR
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          
          if [ "${{ github.ref_name }}" == "skt" ]; then
            IMAGE_NAME=ghcr.io/uengine-oss/process-gpt-skt:$IMAGE_TAG
            IMAGE_NAME_LATEST=ghcr.io/uengine-oss/process-gpt-skt:latest
          else
            IMAGE_NAME=ghcr.io/uengine-oss/process-gpt:$IMAGE_TAG
            IMAGE_NAME_LATEST=ghcr.io/uengine-oss/process-gpt:latest
          fi

          docker build -t $IMAGE_NAME -t $IMAGE_NAME_LATEST .
          docker push $IMAGE_NAME
          docker push $IMAGE_NAME_LATEST

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "IMAGE_NAME_LATEST=$IMAGE_NAME_LATEST" >> $GITHUB_ENV

      # ── Docker 이미지 서명 (cosign keyless - Sigstore OIDC) ──
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_NAME 2>/dev/null || \
                   docker inspect --format='{{.Id}}' $IMAGE_NAME)
          cosign sign --yes "$DIGEST"
          echo "SIGNED_DIGEST=$DIGEST" >> $GITHUB_ENV

      - name: Checkout GitOps repository
        if: github.ref_name == 'main'
        uses: actions/checkout@v3
        with:
          repository: uengine-oss/process-gpt-k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Install yq
        if: github.ref_name == 'main'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in GitOps repository
        if: github.ref_name == 'main'
        run: |
          cd gitops-repo
          mkdir -p .deploy

          # 롤백 기준점: 배포 전(기존) 이미지를 last-good로 먼저 저장
          PREV_IMAGE=$(yq eval '.spec.template.spec.containers[0].image' deployments/frontend-deployment.yaml)
          if [ -n "$PREV_IMAGE" ] && [ "$PREV_IMAGE" != "null" ]; then
            echo "$PREV_IMAGE" > .deploy/last-good-frontend-image.txt
          fi

          # Update frontend deployment image
          yq eval '.spec.template.spec.containers[0].image = "'$IMAGE_NAME'"' -i deployments/frontend-deployment.yaml

          echo "Updated frontend image to: $IMAGE_NAME"

      - name: Commit and push changes
        if: github.ref_name == 'main'
        run: |
          cd gitops-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add .
          git commit -m "Update frontend image to $IMAGE_TAG" || exit 0
          git push

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary (Frontend)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image (commit)** | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image (latest)** | \`${{ env.IMAGE_NAME_LATEST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ env.IMAGE_TAG }}\` / \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cosign Signed** | \`${{ env.SIGNED_DIGEST }}\` |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "| **GitOps Repo** | [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ ArgoCD will automatically sync the changes from the GitOps repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Docker image built and pushed successfully. (GitOps update skipped for ${{ github.ref_name }} branch)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create deployment comment (with retry)
        if: github.ref_name == 'main'
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const maxRetries = 3;
            let attempt = 0;
            
            while (attempt < maxRetries) {
              try {
                const commentBody = [
                  '🚀 **Frontend Deployment Started**',
                  '',
                  '**Image (commit):** `${{ env.IMAGE_NAME }}`',
                  '**Image (latest):** `${{ env.IMAGE_NAME_LATEST }}`',
                  '**Tags:** `${{ env.IMAGE_TAG }}` / `latest`',
                  '',
                  'ArgoCD will automatically sync the changes from [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s)',
                  '',
                  '---',
                  '*Deployed via GitHub Actions*'
                ].join('\n');
                
                await github.rest.repos.createCommitComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: context.sha,
                  body: commentBody
                });
                console.log('Successfully created commit comment');
                break;
              } catch (error) {
                attempt++;
                console.log(`Attempt ${attempt} failed:`, error.message);
                
                if (attempt >= maxRetries) {
                  console.log('All attempts failed, but deployment was successful');
                  core.warning('Failed to create commit comment, but deployment completed successfully');
                } else {
                  console.log(`Retrying in ${attempt * 2} seconds...`);
                  await new Promise(resolve => setTimeout(resolve, attempt * 2000));
                }
              }
            }

  wait_gitops_autosync:
    runs-on: ubuntu-latest
    needs: [build-and-deploy, build-and-deploy-gateway]
    if: github.ref_name == 'main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: uengine-oss/process-gpt-k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GCP_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Wait for frontend/gateway rollout and image update
        run: |
          set -e

          SHA_TAG=$(echo "$GITHUB_SHA" | cut -c1-7)
          EXPECTED_FRONTEND_IMAGE="ghcr.io/uengine-oss/process-gpt:$SHA_TAG"
          EXPECTED_GATEWAY_IMAGE="ghcr.io/uengine-oss/process-gpt-gateway:$SHA_TAG"

          FRONTEND_MANIFEST="gitops-repo/deployments/frontend-deployment.yaml"
          FRONTEND_DEPLOY=$(yq eval '.metadata.name' "$FRONTEND_MANIFEST")
          FRONTEND_NS=$(yq eval '.metadata.namespace' "$FRONTEND_MANIFEST")
          if [ -z "$FRONTEND_NS" ] || [ "$FRONTEND_NS" = "null" ]; then FRONTEND_NS="default"; fi

          if [ -f "gitops-repo/.deploy/last-good-gateway-manifest-path.txt" ]; then
            GATEWAY_MANIFEST_REL=$(cat "gitops-repo/.deploy/last-good-gateway-manifest-path.txt")
          elif [ -f "gitops-repo/deployments/gateway.yaml" ]; then
            GATEWAY_MANIFEST_REL="deployments/gateway.yaml"
          else
            echo "Gateway manifest path not found in GitOps repository."
            exit 1
          fi

          GATEWAY_MANIFEST="gitops-repo/$GATEWAY_MANIFEST_REL"
          if [ ! -f "$GATEWAY_MANIFEST" ]; then
            echo "Gateway manifest file does not exist: $GATEWAY_MANIFEST"
            exit 1
          fi

          GATEWAY_DEPLOY=$(yq eval '.metadata.name' "$GATEWAY_MANIFEST")
          GATEWAY_NS=$(yq eval '.metadata.namespace' "$GATEWAY_MANIFEST")
          if [ -z "$GATEWAY_NS" ] || [ "$GATEWAY_NS" = "null" ]; then GATEWAY_NS="default"; fi

          echo "Waiting rollout: $FRONTEND_NS/$FRONTEND_DEPLOY"
          kubectl rollout status deployment/"$FRONTEND_DEPLOY" -n "$FRONTEND_NS" --timeout=900s
          echo "Waiting rollout: $GATEWAY_NS/$GATEWAY_DEPLOY"
          kubectl rollout status deployment/"$GATEWAY_DEPLOY" -n "$GATEWAY_NS" --timeout=900s

          ACTUAL_FRONTEND_IMAGE=$(kubectl get deployment "$FRONTEND_DEPLOY" -n "$FRONTEND_NS" -o jsonpath='{.spec.template.spec.containers[0].image}')
          ACTUAL_GATEWAY_IMAGE=$(kubectl get deployment "$GATEWAY_DEPLOY" -n "$GATEWAY_NS" -o jsonpath='{.spec.template.spec.containers[0].image}')

          echo "Expected frontend image: $EXPECTED_FRONTEND_IMAGE"
          echo "Actual frontend image:   $ACTUAL_FRONTEND_IMAGE"
          echo "Expected gateway image:  $EXPECTED_GATEWAY_IMAGE"
          echo "Actual gateway image:    $ACTUAL_GATEWAY_IMAGE"

          if [ "$ACTUAL_FRONTEND_IMAGE" != "$EXPECTED_FRONTEND_IMAGE" ]; then
            echo "Frontend deployment image has not switched to expected tag."
            exit 1
          fi

          if [ "$ACTUAL_GATEWAY_IMAGE" != "$EXPECTED_GATEWAY_IMAGE" ]; then
            echo "Gateway deployment image has not switched to expected tag."
            exit 1
          fi

  playwright_smoke_test:
    runs-on: ubuntu-latest
    needs: wait_gitops_autosync
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run smoke test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASS: ${{ secrets.E2E_PASS }}
        run: npm run test:e2e:smoke:ci
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright/test-results
            playwright/playwright-report

  record_last_good_on_success:
    runs-on: ubuntu-latest
    needs: [wait_gitops_autosync, playwright_smoke_test]
    if: github.ref_name == 'main' && success()
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: uengine-oss/process-gpt-k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Record last known good frontend and gateway images
        run: |
          cd gitops-repo
          mkdir -p .deploy

          CURRENT_FRONTEND_IMAGE=$(yq eval '.spec.template.spec.containers[0].image' deployments/frontend-deployment.yaml)
          if [ -n "$CURRENT_FRONTEND_IMAGE" ] && [ "$CURRENT_FRONTEND_IMAGE" != "null" ]; then
            echo "$CURRENT_FRONTEND_IMAGE" > .deploy/last-good-frontend-image.txt
          fi

          if [ -f .deploy/last-good-gateway-manifest-path.txt ]; then
            GATEWAY_MANIFEST_PATH=$(cat .deploy/last-good-gateway-manifest-path.txt)
          elif [ -f deployments/gateway.yaml ]; then
            GATEWAY_MANIFEST_PATH="deployments/gateway.yaml"
            echo "$GATEWAY_MANIFEST_PATH" > .deploy/last-good-gateway-manifest-path.txt
          else
            GATEWAY_MANIFEST_PATH=""
          fi

          if [ -n "$GATEWAY_MANIFEST_PATH" ] && [ -f "$GATEWAY_MANIFEST_PATH" ]; then
            CURRENT_GATEWAY_IMAGE=$(yq eval '.spec.template.spec.containers[0].image' "$GATEWAY_MANIFEST_PATH")
            if [ -n "$CURRENT_GATEWAY_IMAGE" ] && [ "$CURRENT_GATEWAY_IMAGE" != "null" ]; then
              echo "$CURRENT_GATEWAY_IMAGE" > .deploy/last-good-gateway-image.txt
            fi
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .deploy/
          git commit -m "chore: record last known good frontend/gateway images" || exit 0
          git push

  rollback_on_failure:
    runs-on: ubuntu-latest
    needs: [wait_gitops_autosync, playwright_smoke_test]
    if: github.ref_name == 'main' && failure()
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: uengine-oss/process-gpt-k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Rollback frontend and gateway to last good image tags
        run: |
          cd gitops-repo

          if [ -f .deploy/last-good-frontend-image.txt ]; then
            PREV_FRONTEND_IMAGE=$(cat .deploy/last-good-frontend-image.txt)
            yq eval '.spec.template.spec.containers[0].image = "'"$PREV_FRONTEND_IMAGE"'"' -i deployments/frontend-deployment.yaml
          fi

          if [ -f .deploy/last-good-gateway-image.txt ]; then
            PREV_GATEWAY_IMAGE=$(cat .deploy/last-good-gateway-image.txt)
            if [ -f .deploy/last-good-gateway-manifest-path.txt ]; then
              GATEWAY_MANIFEST_PATH=$(cat .deploy/last-good-gateway-manifest-path.txt)
            elif [ -f deployments/gateway.yaml ]; then
              GATEWAY_MANIFEST_PATH="deployments/gateway.yaml"
            else
              GATEWAY_MANIFEST_PATH=""
            fi

            if [ -n "$GATEWAY_MANIFEST_PATH" ] && [ -f "$GATEWAY_MANIFEST_PATH" ]; then
              yq eval '.spec.template.spec.containers[0].image = "'"$PREV_GATEWAY_IMAGE"'"' -i "$GATEWAY_MANIFEST_PATH"
            fi
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A .
          git commit -m "rollback: restore frontend/gateway images to last known good" || exit 0
          git push

  rollback_notification:
    runs-on: ubuntu-latest
    needs: [playwright_smoke_test, rollback_on_failure]
    if: github.ref_name == 'main' && always() && needs.playwright_smoke_test.result == 'failure'
    steps:
      - name: Build rollback notification message
        id: msg
        run: |
          if [ "${{ needs.rollback_on_failure.result }}" = "success" ]; then
            echo "status=completed" >> "$GITHUB_OUTPUT"
            echo "text=🚨 Playwright smoke test failed and rollback completed successfully." >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.rollback_on_failure.result }}" = "failure" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "text=🚨 Playwright smoke test failed and rollback attempt also failed. Immediate action required." >> "$GITHUB_OUTPUT"
          else
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "text=🚨 Playwright smoke test failed but rollback job did not run." >> "$GITHUB_OUTPUT"
          fi

      - name: Write notification summary
        run: |
          echo "## 🔔 Rollback notification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: \`${{ steps.msg.outputs.status }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Message: ${{ steps.msg.outputs.text }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"

  build-and-deploy-gateway:
    runs-on: ubuntu-latest
    needs: build-and-deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Java for Gateway build
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build Gateway JAR
        run: mvn -f gateway/pom.xml -DskipTests package

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Gateway Docker image to GHCR
        run: |
          GATEWAY_IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          GATEWAY_IMAGE_NAME=ghcr.io/uengine-oss/process-gpt-gateway:$GATEWAY_IMAGE_TAG
          GATEWAY_IMAGE_NAME_LATEST=ghcr.io/uengine-oss/process-gpt-gateway:latest

          docker build -t $GATEWAY_IMAGE_NAME -t $GATEWAY_IMAGE_NAME_LATEST ./gateway
          docker push $GATEWAY_IMAGE_NAME
          docker push $GATEWAY_IMAGE_NAME_LATEST

          echo "GATEWAY_IMAGE_TAG=$GATEWAY_IMAGE_TAG" >> $GITHUB_ENV
          echo "GATEWAY_IMAGE_NAME=$GATEWAY_IMAGE_NAME" >> $GITHUB_ENV
          echo "GATEWAY_IMAGE_NAME_LATEST=$GATEWAY_IMAGE_NAME_LATEST" >> $GITHUB_ENV

      - name: Checkout GitOps repository
        uses: actions/checkout@v3
        with:
          repository: uengine-oss/process-gpt-k8s
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update gateway image tag in GitOps repository
        run: |
          cd gitops-repo

          mkdir -p .deploy

          if [ -f deployments/gateway.yaml ]; then
            TARGET_GATEWAY_MANIFEST="deployments/gateway.yaml"
            PREV_GATEWAY_IMAGE=$(yq eval '.spec.template.spec.containers[0].image' "$TARGET_GATEWAY_MANIFEST")
            if [ -n "$PREV_GATEWAY_IMAGE" ] && [ "$PREV_GATEWAY_IMAGE" != "null" ]; then
              echo "$PREV_GATEWAY_IMAGE" > .deploy/last-good-gateway-image.txt
            fi
            echo "$TARGET_GATEWAY_MANIFEST" > .deploy/last-good-gateway-manifest-path.txt
            yq eval '.spec.template.spec.containers[0].image = "'$GATEWAY_IMAGE_NAME'"' -i "$TARGET_GATEWAY_MANIFEST"
            echo "Updated gateway image to: $GATEWAY_IMAGE_NAME"
          else
            # Fallback: try to find any manifest referencing process-gpt-gateway
            GATEWAY_FILES=$(grep -rl "process-gpt-gateway" . || true)
            if [ -n "$GATEWAY_FILES" ]; then
              TARGET_GATEWAY_MANIFEST=$(echo "$GATEWAY_FILES" | head -n 1)
              PREV_GATEWAY_IMAGE=$(yq eval '.spec.template.spec.containers[0].image' "$TARGET_GATEWAY_MANIFEST")
              if [ -n "$PREV_GATEWAY_IMAGE" ] && [ "$PREV_GATEWAY_IMAGE" != "null" ]; then
                echo "$PREV_GATEWAY_IMAGE" > .deploy/last-good-gateway-image.txt
              fi
              echo "$TARGET_GATEWAY_MANIFEST" > .deploy/last-good-gateway-manifest-path.txt
              yq eval '.spec.template.spec.containers[0].image = "'$GATEWAY_IMAGE_NAME'"' -i "$TARGET_GATEWAY_MANIFEST" || true
              echo "Updated gateway image in: $TARGET_GATEWAY_MANIFEST"
            else
              echo "No gateway manifest found in GitOps repo. Skipping gateway image update."
            fi
          fi

      - name: Commit and push changes
        run: |
          cd gitops-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add .
          git commit -m "Update gateway image to $GATEWAY_IMAGE_TAG" || exit 0
          git push

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary (Gateway)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Gateway Image (commit)** | \`${{ env.GATEWAY_IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Gateway Image (latest)** | \`${{ env.GATEWAY_IMAGE_NAME_LATEST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Gateway Tag** | \`${{ env.GATEWAY_IMAGE_TAG }}\` / \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **GitOps Repo** | [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ ArgoCD will automatically sync the changes from the GitOps repository." >> $GITHUB_STEP_SUMMARY

      - name: Create deployment comment (with retry)
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            const maxRetries = 3;
            let attempt = 0;
            
            while (attempt < maxRetries) {
              try {
                const commentBody = [
                  '🚀 **Gateway Deployment Started**',
                  '',
                  '**Gateway Image (commit):** `${{ env.GATEWAY_IMAGE_NAME }}`',
                  '**Gateway Image (latest):** `${{ env.GATEWAY_IMAGE_NAME_LATEST }}`',
                  '**Gateway Tags:** `${{ env.GATEWAY_IMAGE_TAG }}` / `latest`',
                  '',
                  'ArgoCD will automatically sync the changes from [process-gpt-k8s](https://github.com/uengine-oss/process-gpt-k8s)',
                  '',
                  '---',
                  '*Deployed via GitHub Actions*'
                ].join('\n');
                
                await github.rest.repos.createCommitComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: context.sha,
                  body: commentBody
                });
                console.log('Successfully created commit comment');
                break;
              } catch (error) {
                attempt++;
                console.log(`Attempt ${attempt} failed:`, error.message);
                
                if (attempt >= maxRetries) {
                  console.log('All attempts failed, but deployment was successful');
                  core.warning('Failed to create commit comment, but deployment completed successfully');
                } else {
                  console.log(`Retrying in ${attempt * 2} seconds...`);
                  await new Promise(resolve => setTimeout(resolve, attempt * 2000));
                }
              }
            }