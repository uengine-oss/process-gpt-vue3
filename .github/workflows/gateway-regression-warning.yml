name: Gateway Regression Warning

on:
  push:

jobs:
  gateway_regression_deterministic:
    name: Gateway deterministic regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4

      - name: Checkout execution repo
        id: checkout_execution
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: uengine-oss/process-gpt-completion
          path: process-gpt-completion

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install frontend dependencies
        id: install_frontend
        continue-on-error: true
        run: npm install

      - name: Install Playwright browser
        id: install_playwright
        continue-on-error: true
        run: npx playwright install --with-deps chromium

      - name: Run gateway deterministic regression as warning
        env:
          EXECUTION_ROOT: ${{ github.workspace }}/process-gpt-completion
        run: |
          set +e

          if [ "${{ steps.checkout_execution.outcome }}" != "success" ]; then
            echo "::warning title=Gateway deterministic regression skipped::Execution repo checkout failed. Push is not blocked."
            echo "## Gateway deterministic regression" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Result: WARNING" >> "$GITHUB_STEP_SUMMARY"
            echo "- Reason: execution repo checkout failed" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "${{ steps.install_frontend.outcome }}" != "success" ]; then
            echo "::warning title=Gateway deterministic regression skipped::Frontend dependency install failed. Push is not blocked."
            echo "## Gateway deterministic regression" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Result: WARNING" >> "$GITHUB_STEP_SUMMARY"
            echo "- Reason: frontend dependency install failed" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "${{ steps.install_playwright.outcome }}" != "success" ]; then
            echo "::warning title=Gateway deterministic regression skipped::Playwright browser install failed. Push is not blocked."
            echo "## Gateway deterministic regression" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Result: WARNING" >> "$GITHUB_STEP_SUMMARY"
            echo "- Reason: Playwright browser install failed" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          npm run test:e2e:gateway:deterministic:ci
          status=$?

          echo "## Gateway deterministic regression" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`npm run test:e2e:gateway:deterministic:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: deterministic only" >> "$GITHUB_STEP_SUMMARY"

          if [ "$status" -ne 0 ]; then
            echo "::warning title=Gateway deterministic regression failed::Deterministic gateway regression failed with exit code $status. Push is not blocked."
            echo "- Result: WARNING" >> "$GITHUB_STEP_SUMMARY"
            echo "- Exit code: $status" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "- Result: PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-regression-artifacts
          path: |
            playwright/test-results
            playwright/playwright-report
